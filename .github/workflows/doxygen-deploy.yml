name: doxygen-deploy

on:
  push:
    branches: [master] # This should be set to your default branch
    # If your default branch is "main", change it accordingly

jobs:
  deploy-worksheet5:
    # Defines the operating system for the virtual machine
    runs-on: ubuntu-latest

    # List of steps to complete the build
    steps:
    # This is a predefined action that checks out a copy of your code
    - name: Checkout
      uses: actions/checkout@v2

    # Install Doxygen
    - name: Install Doxygen
      run: sudo apt-get install -y doxygen

    # Run Doxygen on Worksheet5 folder
    - name: Run Doxygen
      working-directory: ${{ github.workspace }}/Worksheet5
      run: doxygen

    # Deploy HTML output from Doxygen to gh-pages branch
    - name: Deploy
      uses: JamesIves/github-pages-deploy-action@v4.2.5
      with:
        # The branch the action should deploy to
        branch: gh-pages
        # The folder the action should deploy
        folder: ${{ github.workspace }}/Worksheet5/html
