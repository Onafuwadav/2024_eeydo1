jobs:
  deploy-worksheet5:
    runs-on: ubuntu-latest

    steps:
      # Checkout code
      - name: Checkout code
        uses: actions/checkout@v2
        with:
          fetch-depth: 0  # Ensures full history is checked out

      # Install Doxygen
      - name: Install doxygen
        run: sudo apt-get install -y doxygen

      # Run Doxygen on Worksheet5 folder
      - name: Run Doxygen
        working-directory: ${{ github.workspace }}/Worksheet5
        run: doxygen

      # Set Git config for pushing
      - name: Set Git config
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      # Deploy to GitHub Pages
      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4.2.5
        with:
          branch: gh-pages  # Specify the target branch
          folder: ${{ github.workspace }}/Worksheet5/html  # Path to the folder to deploy
          token: ${{ secrets.GITHUB_TOKEN }}  # Use the GitHub token here
